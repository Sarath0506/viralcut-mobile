name: Build Android (APK + AAB)

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: API URL baked into the APK
        required: false
        default: https://viralcut-api-production-6825.up.railway.app
  push:
    branches: [main]
    paths:
      - lib/**
      - pubspec.yaml
      - pubspec.lock
      - android/**
      - packages/**
      - .github/workflows/build-apk.yml

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ github.event.inputs.api_base_url || vars.API_BASE_URL || 'https://viralcut-api-production-6825.up.railway.app' }}
      KEYSTORE_PATH: ${{ github.workspace }}/android/upload-keystore.p12
      STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
      KEY_ALIAS: upload
      KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Reconstruct keystore
        run: |
          echo "${{ secrets.KEYSTORE_KEY_PEM }}" | base64 --decode > /tmp/signing_key.pem
          echo "${{ secrets.KEYSTORE_CERT_PEM }}" | base64 --decode > /tmp/signing_cert.pem
          openssl pkcs12 -export \
            -in /tmp/signing_cert.pem \
            -inkey /tmp/signing_key.pem \
            -name upload \
            -out android/upload-keystore.p12 \
            -passout "pass:${{ secrets.KEYSTORE_STORE_PASSWORD }}" \
            -certpbe PBE-SHA1-3DES \
            -keypbe PBE-SHA1-3DES \
            -macalg sha1
          rm -f /tmp/signing_key.pem /tmp/signing_cert.pem

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --dart-define=API_BASE_URL=${{ env.API_BASE_URL }}

      - name: Build release AAB
        run: flutter build appbundle --release --dart-define=API_BASE_URL=${{ env.API_BASE_URL }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: halchal-creator-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: halchal-creator-aab-${{ github.run_number }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
