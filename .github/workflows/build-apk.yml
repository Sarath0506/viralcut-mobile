name: Build Android + iOS

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: API URL baked into the build
        required: false
        default: https://viralcut-api-production-6825.up.railway.app
  push:
    branches: [main]
    paths:
      - lib/**
      - pubspec.yaml
      - pubspec.lock
      - android/**
      - ios/**
      - packages/**
      - .github/workflows/build-apk.yml

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ github.event.inputs.api_base_url || vars.API_BASE_URL || 'https://viralcut-api-production-6825.up.railway.app' }}
      KEYSTORE_PATH: ${{ github.workspace }}/android/upload-keystore.p12
      STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
      KEY_ALIAS: upload
      KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_B64" | base64 --decode > android/upload-keystore.p12
          echo "Keystore size: $(wc -c < android/upload-keystore.p12) bytes"
          echo "Keystore MD5:  $(md5sum android/upload-keystore.p12 | cut -d' ' -f1)"

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --dart-define=API_BASE_URL=${{ env.API_BASE_URL }}

      - name: Build release AAB
        run: flutter build appbundle --release --dart-define=API_BASE_URL=${{ env.API_BASE_URL }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: halchal-creator-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: halchal-creator-aab-${{ github.run_number }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  build-ios:
    runs-on: macos-latest
    env:
      API_BASE_URL: ${{ github.event.inputs.api_base_url || vars.API_BASE_URL || 'https://viralcut-api-production-6825.up.railway.app' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Apple certificate
        env:
          P12_B64: ${{ secrets.IOS_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          printf '%s' "$P12_B64" | base64 -D > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PP_B64: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          printf '%s' "$PP_B64" | base64 -D > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/
          security cms -D -i "$PP_PATH" > /tmp/profile.plist 2>/dev/null
          PROFILE_UUID=$(plutil -extract UUID raw /tmp/profile.plist)
          sed -i '' "s/PROFILE_UUID_PLACEHOLDER/$PROFILE_UUID/g" ios/ExportOptions.plist
          echo "Installed profile UUID: $PROFILE_UUID"

      - name: Install dependencies
        run: flutter pub get

      - name: Build release IPA
        run: |
          flutter build ipa --release \
            --dart-define=API_BASE_URL=${{ env.API_BASE_URL }} \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: halchal-creator-ipa-${{ github.run_number }}
          path: build/ios/ipa/*.ipa
          retention-days: 30

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db
